name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check scatterbrain tests

      - name: Lint (flake8)
        run: flake8 scatterbrain tests

      - name: Type check (mypy)
        run: mypy scatterbrain
        continue-on-error: true   # non-blocking until type annotations are complete

      - name: Run tests with coverage
        run: pytest --cov=scatterbrain --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build Sphinx docs
        run: sphinx-build -W -b html docs/source docs/_build/html
